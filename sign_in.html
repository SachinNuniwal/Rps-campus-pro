<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS College Login</title>
    <link rel="stylesheet" href="sign_in.css">

</head>

<body>

    <div class="container">

        <!-- LEFT SIDE -->
        <div class="left">
            <img src="rps img.jpg" class="bg-img">

            <div class="overlay"></div>

            <div class="left-content">
                <div class="logo">
                    <img src="rps_goi_logo.jpg">
                    <h1>RPS Institutions</h1>
                </div>

                <div class="text">
                    <h2>Empowering Minds,<br><span>Shaping The Future.</span></h2>
                    <p>Welcome to the centralized campus portal. Access your attendance, results, lectures, and updates.
                    </p>
                </div>
            </div>
        </div>

        <!-- RIGHT SIDE -->
        <div class="right">

            <div class="login-box">

                <h2>Welcome back</h2>
                <p>Sign in to your account to continue</p>

                <!-- Tabs -->
                <div class="tabs">
                    <button class="tab active" data-role="student">Student</button>
                    <button class="tab" data-role="teacher">Teacher</button>
                    <button class="tab" data-role="admin">Admin</button>
                </div>

                <!-- Form -->
                <form id="loginForm">
                    <div class="row">
                        <label>Email Address</label>
                        <input type="email" id="email" placeholder="student@rps.edu" required>
                    </div>

                    <div class="password-row">
                        <label for="password">Password</label>
                    </div>

                    <input type="password" id="password" placeholder="••••••••" required>
                    <a href="#" class="forgot">Forgot password?</a>
                    <button class="login-btn">Sign In →</button>
                    <p class="note" id="roleText">Login as Student</p>
                </form>
                <script src="sign_in.js"></script>
            </div>
</body>

</html>
