<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS College Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="register.css">

</head>

<body>

    <div class="container">

        <!-- LEFT SIDE -->
        <div class="left">
            <img src="rps img.jpg" class="bg-img">

            <div class="overlay"></div>

            <div class="left-content">
                <div class="logo">
                    <img src="rps_goi_logo.jpg">
                    <h1>RPS group of Institutions engineering and technology</h1>
                </div>

                <div class="text">
                    <h1>Empowering Minds,<br><span>Shaping The Future.</span></h1>
                    <p>Welcome to the centralized campus portal. Access your attendance, results, lectures, and updates.
                    </p>
                </div>
            </div>
        </div>

        <!-- RIGHT SIDE -->
        <div class="right">

            <div class="login-box">

                <h2>Please fill your details</h2>
                <p>Sign in to your account to continue</p>

                <!-- Tabs -->
                <div class="tabs">
                    <button class="tab active" data-role="student">Student</button>
                    <button class="tab" data-role="teacher">Teacher</button>
                    <button class="tab" data-role="admin">Admin</button>
                </div>

                <!-- Form -->
                <form id="loginForm">
                    <div>
                        <label for="name">Full name</label>
                        <input type="text" placeholder="enter your name" id="name" required>
                    </div>
                    <div>
                        <label for="number">Phone number</label>
                        <input type="number" placeholder="enter your phone number" id="number" required>
                    </div>
                    <div>
                        <label>Email Address</label>
                        <input type="email" id="email" placeholder="student@rps.edu" required>
                    </div>
                    <div class="row">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    <div class="field">
                        <label for="password">Confirm Password</label>
                        <input type="password" placeholder="confirm your password" id="password" required>
                    </div>
                    <button class="login-btn">register →</button>
                    <p class="form-footer">
                       <pre>>>         Already have an account? <a href="login.html">Sign in</a> </pre>
                    </p>
                </form>
                <script src="index.js"></script>
            </div>
</body>

</html>
